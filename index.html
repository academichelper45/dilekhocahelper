<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilek Hoca Asistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>
    <script type="text/babel">
        // API KEY BURAYA GELECEK
        const apiKey = "BURAYA_API_ANAHTARINI_YAPISTIR"; 

        const { useState } = React;
        const { Users, Clock, LogOut, UserCheck } = lucide;

        const initialStudents = [
            { id: 1, name: "Kerem Kırıcı", interests: "Bilgisayar oyunları, Uzay" },
            { id: 2, name: "Adil Adar Vural", interests: "Tarih, Çizgi romanlar" },
            { id: 3, name: "Baran Toprak Sezer", interests: "Spor, Basketbol" }
        ];

        const submissions = [
            { id: 1, title: "Sabır ve Metanet", aiScore: 41, date: "13.05.2026", grade: 85, content: "Sabır, zorluklar karşısında sakin kalmaktır..." }
        ];

        const App = () => (
            <div className="min-h-screen">
                <nav className="bg-white border-b p-4 flex justify-between items-center shadow-sm">
                    <div className="flex items-center gap-2">
                        <div className="bg-indigo-600 p-2 rounded-lg"><UserCheck className="text-white"/></div>
                        <span className="font-bold text-xl text-slate-800">Dilek Hoca <span className="text-indigo-600">Asistan</span></span>
                    </div>
                    <button className="text-slate-500 flex items-center gap-1"><LogOut size={18}/> Çıkış</button>
                </nav>
                <main className="max-w-6xl mx-auto p-8">
                    <h2 className="text-3xl font-bold text-slate-900 mb-8">Öğretmen Kontrol Paneli</h2>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2">
                            <h3 className="font-bold mb-4 flex items-center gap-2"><Users className="text-indigo-600"/> Öğrenci Listesi</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {initialStudents.map(s => (
                                    <div key={s.id} className="bg-white p-4 rounded-xl border shadow-sm">
                                        <p className="font-bold">{s.name}</p>
                                        <p className="text-xs text-slate-400 uppercase tracking-tighter">{s.interests}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div>
                            <h3 className="font-bold mb-4 flex items-center gap-2"><Clock className="text-indigo-600"/> Son Teslimler</h3>
                            {submissions.map(sub => (
                                <div key={sub.id} className="bg-white p-4 rounded-xl border-l-4 border-indigo-500 shadow-sm">
                                    <div className="flex justify-between text-sm mb-2 font-bold">
                                        <span>Kerem Kırıcı</span>
                                        <span className="text-green-600 bg-green-50 px-2 rounded-full">AI: %{sub.aiScore}</span>
                                    </div>
                                    <p className="text-xs text-indigo-600 font-bold uppercase">{sub.title}</p>
                                    <div className="mt-4 flex justify-between text-[10px] font-bold">
                                        <span className="text-slate-400">{sub.date}</span>
                                        <span className="bg-indigo-600 text-white px-2 py-0.5 rounded">NOT: {sub.grade}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </main>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
